<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading…</title>
  <script src="coi-serviceworker.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    body { margin: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    #status { color: #555; font-family: monospace; font-size: 14px; margin-bottom: 8px; }
    #terminal { border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="status">Loading Python…</div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    // SharedArrayBuffer layout (Int32Array):
    //   [0]  status: 0=empty, 1=key available
    //   [1]  byte length of key data
    //   [2..65] key data bytes
    const inputBuf = new SharedArrayBuffer(66 * 4);
    const inputArr = new Int32Array(inputBuf);

    const term = new Terminal({
      cursorBlink: true,
      fontSize: 16,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace',
      theme: { background: '#ffffff', foreground: '#000000', cursor: '#000000', selectionBackground: '#b0c4de' },
      cols: 80,
      rows: 26,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Forward keystrokes into the shared buffer
    term.onData((data) => {
      const encoded = new TextEncoder().encode(data);
      const len = Math.min(encoded.length, 64);
      Atomics.store(inputArr, 1, len);
      for (let i = 0; i < len; i++) {
        Atomics.store(inputArr, 2 + i, encoded[i]);
      }
      Atomics.store(inputArr, 0, 1);
      Atomics.notify(inputArr, 0);
    });

    // Set title from game config
    fetch('game.json').then(r => r.json()).then(config => {
      document.title = config.title;
    });

    // Start the worker
    const worker = new Worker('worker.js');
    worker.postMessage({ type: 'init', inputBuf });

    worker.onmessage = (e) => {
      const msg = e.data;
      if (msg.type === 'output') {
        term.write(msg.data);
      } else if (msg.type === 'ready') {
        document.getElementById('status').textContent = 'Ready';
      }
    };

    term.focus();

    worker.onerror = (err) => {
      document.getElementById('status').textContent = 'Worker error: ' + err.message;
      term.write('\r\n\x1b[31mWorker error: ' + err.message + '\x1b[m\r\n');
    };

    window.addEventListener('resize', () => fitAddon.fit());
  </script>
</body>
</html>
